tasks:
  - source: tasks/viz_metadata.py
    product:
      nb: "products/viz_metadata.ipynb"
      data: "products/viz_metadata_readiness.csv"
    params:
      solr_url: "{{solr_url}}"
      solr_user_env: "{{solr_user_env}}"
      solr_pass_env: "{{solr_pass_env}}"

  - source: tasks/curate_failing.py
    name: "curate_failing_[[filter_project]]"
    product:
      nb: "products/curate_failing_[[filter_project]].ipynb"
      data: "products/curate_failing_[[filter_project]].html"
      data_csv: "products/curate_failing_data_[[filter_project]].csv"
    params:
      # OR-combined filters; leave "" to not filter on that dimension.
      # All empty = curate every failing study (capped by max_studies).
      filter_tag: ""                 # s_uuid_s server tag; NNRG = NanoREG (public AMBIT server)
      filter_s_uuid: ""              # matches s_uuid_s
      filter_document_uuid: ""       # matches document_uuid_s
      filter_investigation_uuid: ""  # matches investigation_uuid_s
      max_studies: 1000
    grid:
      filter_project: ["nanoreg","nanoreg2","enpra","nanotest","nanogenotox","calibrate","sanowork","riskgone"]

  - source: tasks/curate_passing.py
    name: "curate_passing_[[filter_project]]"
    product:
      nb: "products/curate_passing_[[filter_project]].ipynb"
      data: "products/curate_passing_[[filter_project]].html"
      data_csv: "products/curate_passing_data_[[filter_project]].csv"
    params:
      # OR-combined filters; leave "" to not filter on that dimension.
      # All empty = curate every interpretable study (capped by max_studies).
      filter_tag: ""                 # s_uuid_s server tag; NNRG = NanoREG (public AMBIT server)
      filter_s_uuid: ""              # matches s_uuid_s
      filter_document_uuid: ""       # matches document_uuid_s
      filter_investigation_uuid: ""  # matches investigation_uuid_s
      max_studies: 1000
    grid:
      filter_project: ["nanoreg","nanoreg2","enpra","nanotest","nanogenotox","calibrate","sanowork", "riskgone"]